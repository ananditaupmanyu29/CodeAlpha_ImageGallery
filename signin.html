<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | My Vision Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="top-header">
        <a href="index.html" class="about-btn">Home</a>
        <a href="about.html" class="signin-btn">About Us</a>
        <h2>My Vision Gallery</h2>
    </header>

    <!-- Sign In Section -->
    <section class="signin-page">
        <div class="signin-box">
            <h1>Sign In</h1>
            <p>Please fill in your details</p>

            <form id="loginForm">
                <div class="input-box">
                    <input type="text" id="name" placeholder="Enter Your Name">
                    <small class="error" id="nameError"></small>
                </div>

                <div class="input-box">
                    <input type="text" id="phone" placeholder="Enter 10-digit Number">
                    <small class="error" id="phoneError"></small>
                </div>

                <div class="input-box">
                    <input type="text" id="email" placeholder="Enter Your Email">
                    <small class="error" id="emailError"></small>
                </div>

                <button type="submit">Submit</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        My Vision Gallery | Designed for Professional Showcase | ananditaupmanyu29@gmail.com
    </footer>

    <script src="java.js"></script>
</body>
</html>
